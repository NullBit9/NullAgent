<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StonkAI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 1rem 1.5rem;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .header .emoji {
            font-size: 1.5rem;
        }
        
        .config {
            padding: 1rem 1.5rem;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .config label {
            font-size: 0.875rem;
            color: #8b949e;
        }
        
        .config input {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            min-width: 200px;
        }
        
        .config input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        
        .config button {
            background: #238636;
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
        }
        
        .config button:hover {
            background: #2ea043;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            line-height: 1.5;
            animation: fadeIn 0.2s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            align-self: flex-end;
            background: #1f6feb;
            color: white;
        }
        
        .message.assistant {
            align-self: flex-start;
            background: #21262d;
            border: 1px solid #30363d;
        }
        
        .message .sender {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 0.25rem;
            font-weight: 600;
        }
        
        .input-area {
            padding: 1rem 1.5rem;
            background: #161b22;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 0.75rem;
        }
        
        .input-area input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .input-area input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        
        .input-area button {
            background: #1f6feb;
            border: none;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
        }
        
        .input-area button:hover:not(:disabled) {
            background: #388bfd;
        }
        
        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .status {
            padding: 0.5rem 1.5rem;
            font-size: 0.75rem;
            color: #8b949e;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8b949e;
        }
        
        .status.connected .dot {
            background: #3fb950;
        }
        
        .status.error .dot {
            background: #f85149;
        }
        
        .typing {
            font-style: italic;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="emoji">📈</span>
        <h1>StonkAI Chat</h1>
    </div>
    
    <div class="config" id="config">
        <div>
            <label>Gateway URL</label>
            <input type="text" id="gatewayUrl" placeholder="http://localhost:3000" value="http://localhost:3000">
        </div>
        <div>
            <label>Token</label>
            <input type="password" id="token" placeholder="Your OpenClaw token">
        </div>
        <button onclick="saveConfig()">Connect</button>
    </div>
    
    <div class="status" id="status">
        <span class="dot"></span>
        <span>Configure gateway to connect</span>
    </div>
    
    <div class="messages" id="messages"></div>
    
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type a message..." 
               onkeypress="if(event.key==='Enter')sendMessage()" disabled>
        <button onclick="sendMessage()" id="sendBtn" disabled>Send</button>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusEl = document.getElementById('status');
        
        let config = {
            gatewayUrl: localStorage.getItem('gatewayUrl') || 'http://localhost:3000',
            token: localStorage.getItem('token') || ''
        };
        
        // Load saved config
        document.getElementById('gatewayUrl').value = config.gatewayUrl;
        document.getElementById('token').value = config.token;
        
        if (config.token) {
            updateStatus('Ready to connect', 'connected');
            enableInput();
        }
        
        function saveConfig() {
            config.gatewayUrl = document.getElementById('gatewayUrl').value.trim();
            config.token = document.getElementById('token').value.trim();
            
            localStorage.setItem('gatewayUrl', config.gatewayUrl);
            localStorage.setItem('token', config.token);
            
            updateStatus('Connected', 'connected');
            enableInput();
        }
        
        function updateStatus(text, state) {
            statusEl.className = 'status ' + (state || '');
            statusEl.querySelector('span:last-child').textContent = text;
        }
        
        function enableInput() {
            messageInput.disabled = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }
        
        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `<div class="sender">${sender === 'user' ? 'You' : 'StonkAI'}</div>` +
                          `<div>${escapeHtml(text)}</div>`;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !config.token) return;
            
            addMessage(text, 'user');
            messageInput.value = '';
            sendBtn.disabled = true;
            
            // Show typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant typing';
            typingDiv.innerHTML = '<div class="sender">StonkAI</div><div>typing...</div>';
            messagesEl.appendChild(typingDiv);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            
            try {
                // Send to OpenClaw gateway
                const response = await fetch(`${config.gatewayUrl}/api/v1/sessions/send`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${config.token}`
                    },
                    body: JSON.stringify({
                        message: text,
                        sessionKey: 'webchat'
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                // Remove typing indicator
                typingDiv.remove();
                
                // Add response
                if (data.response || data.message) {
                    addMessage(data.response || data.message, 'assistant');
                } else {
                    addMessage('Message sent. Waiting for response...', 'assistant');
                }
                
            } catch (err) {
                typingDiv.remove();
                addMessage(`Error: ${err.message}. Make sure your OpenClaw gateway is running.`, 'assistant');
                updateStatus('Connection failed', 'error');
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }
    </script>
</body>
</html>
