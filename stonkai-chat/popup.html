<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 400px;
      height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      padding: 12px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    
    .config {
      padding: 12px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    
    .config-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    
    .config input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
    }
    
    .config input:focus {
      outline: none;
      border-color: #58a6ff;
    }
    
    .config button {
      background: #238636;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .message {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.4;
    }
    
    .message.user {
      align-self: flex-end;
      background: #1f6feb;
      color: white;
    }
    
    .message.assistant {
      align-self: flex-start;
      background: #21262d;
      border: 1px solid #30363d;
    }
    
    .input-area {
      padding: 12px;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      gap: 8px;
    }
    
    .input-area input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
    }
    
    .input-area button {
      background: #1f6feb;
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .status {
      padding: 8px 16px;
      font-size: 11px;
      color: #8b949e;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>📈</span>
    <h1>StonkAI Chat</h1>
  </div>
  
  <div class="config" id="config">
    <div class="config-row">
      <input type="text" id="gatewayUrl" placeholder="Gateway URL (e.g., http://localhost:3000)" value="http://localhost:3000">
    </div>
    <div class="config-row">
      <input type="password" id="token" placeholder="Your OpenClaw token">
      <button id="saveBtn">Save</button>
    </div>
  </div>
  
  <div class="status" id="status">Enter your gateway URL and token</div>
  
  <div class="messages" id="messages"></div>
  
  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Type a message...">
    <button id="sendBtn">Send</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
